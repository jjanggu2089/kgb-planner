<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>프라이빗 스터디 플래너</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; margin: 0; padding: 20px; background-color: #f4f7f6; color: #333; }
        .container { max-width: 1200px; margin: 0 auto; background-color: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.08); position: relative; }
        .header-section { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        h1 { margin: 0; color: #2c3e50; font-size: 1.6em; }
        #syncStatus { position: absolute; top: 30px; right: 25px; font-size: 0.85em; font-weight: bold; color: #7f8c8d; background: #ecf0f1; padding: 5px 10px; border-radius: 15px; }
        .sync-active { color: #f39c12 !important; background: #fdf2e9 !important; }
        .sync-done { color: #27ae60 !important; background: #eaeded !important; }
        #loginOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #f4f7f6; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        .login-box { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
        .login-btn { background: #4285F4; color: white; border: none; padding: 12px 24px; font-size: 1.1em; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 20px; transition: background 0.2s; }
        .login-btn:hover { background: #3367D6; }
        .tabs { display: flex; border-bottom: 2px solid #ddd; margin-bottom: 20px; gap: 5px; }
        .tab { padding: 12px 25px; cursor: pointer; font-weight: bold; color: #95a5a6; border-bottom: 3px solid transparent; border-radius: 8px 8px 0 0; transition: all 0.2s; }
        .tab:hover { background-color: #f1f2f6; }
        .tab.active { color: #2c3e50; border-bottom: 3px solid #3498db; background-color: #f8f9fa; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s; }
        .dday-container { display: flex; align-items: center; gap: 10px; margin-right: 120px; }
        #ddayDisplay { font-weight: bold; font-size: 1.2em; color: #e74c3c; background: #fdf2f2; padding: 6px 14px; border-radius: 20px; }
        .input-box { padding: 6px; border: 1px solid #ddd; border-radius: 4px; font-size: 0.9em; font-family: inherit; }
        button { padding: 8px 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: background 0.2s; }
        .add-btn { background-color: #3498db; color: white; }
        .add-btn:hover { background-color: #2980b9; }
        .add-btn-small { padding: 4px 10px; font-size: 0.85em; }
        .delete-btn { background-color: #e74c3c; color: white; padding: 6px 12px; font-size: 0.85em; }
        .nav-btn { background-color: #ecf0f1; color: #2c3e50; border: 1px solid #bdc3c7; }
        .nav-btn:hover { background-color: #bdc3c7; }
        .progress-wrapper { background-color: #e0e0e0; border-radius: 8px; overflow: hidden; height: 26px; }
        .progress-bar { height: 100%; background-color: #27ae60; width: 0%; text-align: center; line-height: 26px; color: white; font-weight: bold; transition: width 0.4s ease; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; vertical-align: middle; }
        th { background-color: #ecf0f1; font-weight: bold; }
        td input[type="text"] { width: 95%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        input[type="checkbox"] { width: 20px; height: 20px; cursor: pointer; }
        .completed-row { background-color: #f0fdf4; }
        .completed-row input[type="text"] { color: #94a3b8; text-decoration: line-through; }
        .memo-area { width: 100%; height: 120px; padding: 15px; border: 1px solid #ccc; border-radius: 6px; resize: vertical; box-sizing: border-box; font-family: inherit; line-height: 1.5; margin-top: 20px; }
        .date-selector-area { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: #f8f9fa; padding: 15px; border-radius: 8px; border: 1px solid #eee; }
        .time-badge { font-size: 1.1em; font-weight: bold; color: #d35400; background: #fdebd0; padding: 8px 15px; border-radius: 8px; border: 1px solid #fad7a1;}
        .time-input-group { display: flex; align-items: center; justify-content: center; gap: 5px; }
        .time-input { padding: 6px; border: 1px solid #ccc; border-radius: 4px; font-family: inherit; font-size: 0.9em; width: 100px; }
        .calendar-container { margin-bottom: 30px; border: 1px solid #ddd; border-radius: 8px; overflow: hidden; }
        .calendar-header { display: grid; grid-template-columns: repeat(7, 1fr); background: #34495e; color: white; text-align: center; font-weight: bold; }
        .calendar-header div { padding: 10px 0; border-right: 1px solid #465c71; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); background: #eee; gap: 1px; }
        .calendar-cell { background: #fff; min-height: 100px; padding: 8px; display: flex; flex-direction: column; gap: 4px; cursor: pointer; transition: background 0.2s; }
        .calendar-cell:hover { background: #e8f4f8; }
        .calendar-cell.empty { background: #f9f9f9; cursor: default; }
        .cal-day-num { font-weight: bold; color: #7f8c8d; font-size: 0.9em; margin-bottom: 5px; }
        .cal-badge { font-size: 0.75em; padding: 4px 6px; border-radius: 4px; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px;}
        .badge-goal { background-color: #3498db; }
        .badge-deadline { background-color: #e67e22; }
        .badge-time { background-color: #27ae60; text-align: center; font-weight: bold;}
        .badge-memo { background-color: #9b59b6; }
        .monthly-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .monthly-card { background: #fdfdfd; padding: 20px; border-radius: 8px; border: 1px solid #eee; }
        .list-item { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; }
        .list-item input[type="text"] { flex: 1; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        .day-label { font-size: 0.85em; font-weight: bold; color: #7f8c8d; width: 30px; text-align: center; }
        @media (max-width: 768px) {
            body { padding: 5px; }
            .container { padding: 15px; }
            .header-section { flex-direction: column; align-items: flex-start; gap: 15px; }
            .dday-container { margin-right: 0; width: 100%; flex-wrap: wrap; justify-content: space-between; }
            table { display: block; overflow-x: auto; white-space: nowrap; -webkit-overflow-scrolling: touch; border-bottom: 1px solid #ddd; }
            th, td { padding: 6px; font-size: 0.9em; min-width: 80px; }
            .time-input { width: 85px; }
            .date-selector-area { flex-direction: column; align-items: flex-start; gap: 10px; }
            .date-selector-area > div { flex-wrap: wrap; width: 100%; gap: 5px; }
            .time-badge { width: 100%; text-align: center; box-sizing: border-box; }
            .nav-btn { padding: 6px 10px; font-size: 0.85em; }
            .calendar-cell { min-height: 70px; padding: 3px; }
            .cal-badge { font-size: 0.65em; padding: 2px 4px; }
            .monthly-grid { grid-template-columns: 1fr; gap: 10px; }
            .monthly-card { padding: 15px; }
            .tab { padding: 10px 15px; font-size: 0.9em; flex: 1; text-align: center; }
        }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-box">
        <h2 style="margin-top:0; color:#2c3e50;">🔒 스터디 플래너</h2>
        <p style="color:#7f8c8d;">승인된 사용자만 접근할 수 있습니다.</p>
        <button class="login-btn" onclick="loginWithGoogle()">Google 계정으로 로그인</button>
    </div>
</div>

<div class="container" id="appContainer" style="display: none;">
    <div id="syncStatus">🟡 서버 연결 대기중...</div>

    <div class="header-section">
        <div style="display: flex; align-items: center; gap: 15px;">
            <h1>📝 스터디 플래너</h1>
            <span id="ddayDisplay">D-Day 설정</span>
        </div>
        <div class="dday-container">
            <span style="font-size: 0.9em; color: #666;">목표 날짜:</span>
            <input type="date" id="goalDate" class="input-box" onchange="updateDday()">
            <button onclick="logout()" style="background:#e74c3c; color:white; padding:5px 10px; font-size:0.8em; margin-left:10px;">로그아웃</button>
        </div>
    </div>

    <div class="tabs">
        <div id="tabDaily" class="tab active" onclick="switchTab('daily')">📅 일별 플래너</div>
        <div id="tabMonthly" class="tab" onclick="switchTab('monthly')">🎯 월별 플래너</div>
    </div>

    <div id="dailyView" class="tab-content active">
        <div class="date-selector-area">
            <div style="display: flex; align-items: center; gap: 10px;">
                <button class="nav-btn" onclick="changeDailyDay(-1)">◀ 어제</button>
                <input type="date" id="dailyDateSelector" class="input-box" style="font-size: 1.2em; font-weight: bold;" onchange="renderDaily()">
                <span id="dailyDayOfWeek" style="font-size: 1.2em; font-weight: bold; color: #34495e;">(요일)</span>
                <button class="nav-btn" style="margin-left:5px;" onclick="changeDailyDay(1)">내일 ▶</button>
                <button class="nav-btn" style="margin-left:10px;" onclick="goToToday()">오늘</button>
            </div>
            <div id="dailyTotalTime" class="time-badge">⏱️ 하루 공부시간: 0시간 0분</div>
        </div>

        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <div class="progress-wrapper" style="width: 70%;"><div class="progress-bar" id="progressBar">0%</div></div>
            <button class="add-btn add-btn-small" onclick="addDailyRow()">+ 새 일정 추가</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th style="width: 15%;">계획 시간</th><th style="width: 25%;">계획 내용</th>
                    <th style="width: 20%;">실제 시간 (시작~종료)</th><th style="width: 25%;">실제 내용</th><th style="width: 5%;">완료</th><th style="width: 10%;">관리</th>
                </tr>
            </thead>
            <tbody id="plannerBody"></tbody>
        </table>
        
        <h3 style="margin-top: 30px; margin-bottom: 10px; color: #2c3e50; font-size: 1.2em;">오늘의 회고 및 메모</h3>
        <textarea id="dailyMemoInput" class="memo-area" placeholder="오늘 공부하며 느낀 점을 적어보세요." onfocus="window.isTyping=true" onblur="window.isTyping=false" oninput="updateDailyMemo(this.value)"></textarea>
    </div>

    <div id="monthlyView" class="tab-content">
        <div class="date-selector-area">
            <div style="display: flex; align-items: center; gap: 10px;">
                <button class="nav-btn" onclick="changeMonthOffset(-1)">◀ 이전 달</button>
                <input type="month" id="monthSelector" class="input-box" style="font-size: 1.2em; font-weight: bold;" onchange="changeMonth()">
                <button class="nav-btn" onclick="changeMonthOffset(1)">다음 달 ▶</button>
                <button class="nav-btn" style="margin-left:10px;" onclick="goToThisMonth()">이번 달</button>
            </div>
            <div id="monthlyTotalTime" class="time-badge" style="background:#e8f4f8; color:#2980b9; border-color:#baddf0;">🗓️ 월 누적 시간: 0시간 0분</div>
        </div>
        <div class="calendar-container">
            <div class="calendar-header">
                <div>일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div>토</div>
            </div>
            <div class="calendar-grid" id="calendarGrid"></div>
        </div>
        <div class="monthly-grid">
            <div class="monthly-card">
                <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:2px solid #ecf0f1; padding-bottom:10px; margin-bottom:15px;">
                    <h3 style="margin:0;">🎯 핵심 목표</h3>
                    <button class="add-btn add-btn-small" onclick="addGoal()">+ 목표 추가</button>
                </div>
                <div id="goalContainer"></div>
            </div>
            <div class="monthly-card">
                <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:2px solid #ecf0f1; padding-bottom:10px; margin-bottom:15px;">
                    <h3 style="margin:0;">🚨 주요 일정</h3>
                    <button class="add-btn add-btn-small" onclick="addDeadline()">+ 일정 추가</button>
                </div>
                <div id="deadlineContainer"></div>
            </div>
        </div>
        <div class="monthly-card">
            <h3 style="margin-top:0; border-bottom:2px solid #ecf0f1; padding-bottom:10px;">📝 월간 회고</h3>
            <textarea id="monthlyMemoInput" class="memo-area" placeholder="이번 달 피드백을 적어보세요." onfocus="window.isTyping=true" onblur="window.isTyping=false" oninput="updateMonthlyMemo(this.value)"></textarea>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, onSnapshot, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    // 💡 [필수] 본인의 파이어베이스 설정값으로 채워주세요!
    const firebaseConfig = {
        apiKey: "AIzaSyC4J47Xe8eqv9Gf2MNReewVia77G3dyMsc",
        authDomain: "kgb-planner.firebaseapp.com",
        projectId: "kgb-planner",
        storageBucket: "kgb-planner.firebasestorage.app",
        messagingSenderId: "215060228950",
        appId: "1:215060228950:web:1534f87f7f9ed70cb484f7",
        measurementId: "G-1VM8T24LHW"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();
    const docRef = doc(db, "plannerDB", "myData");

    let appData = { dailyStore: {}, goalDate: "", monthlyDataStore: {} };
    const statusEl = document.getElementById('syncStatus');
    let saveTimeout;
    let unsubscribeSnapshot = null;
    
    window.isTyping = false; 
    const DAY_NAMES = ['일', '월', '화', '수', '목', '금', '토'];

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('appContainer').style.display = 'block';
            startSync();
        } else {
            document.getElementById('loginOverlay').style.display = 'flex';
            document.getElementById('appContainer').style.display = 'none';
            if(unsubscribeSnapshot) unsubscribeSnapshot();
        }
    });

    window.loginWithGoogle = () => { signInWithPopup(auth, provider).catch(err => alert("로그인 에러: " + err.message)); };
    window.logout = () => { if(confirm("로그아웃 하시겠습니까?")) signOut(auth); };

    function startSync() {
        unsubscribeSnapshot = onSnapshot(docRef, (docSnap) => {
            if (docSnap.exists()) {
                appData = docSnap.data();
                if(!appData.dailyStore) appData.dailyStore = {};
                if(!appData.monthlyDataStore) appData.monthlyDataStore = {};
                
                if(!window.isTyping) updateUI();
                setStatus("✅ 동기화 완료", "sync-done");
            } else {
                setDoc(docRef, { dailyStore: {}, goalDate: "", monthlyDataStore: {} });
            }
        }, (error) => { setStatus("❌ 권한 오류", "sync-active"); console.error(error); });
    }

    function saveToServer() {
        setStatus("☁️ 저장 중...", "sync-active");
        clearTimeout(saveTimeout);
        saveTimeout = setTimeout(async () => {
            try { await updateDoc(docRef, appData); setStatus("✅ 저장됨", "sync-done"); } 
            catch(e) { console.error(e); setStatus("❌ 저장 실패", "sync-active"); }
        }, 1500); 
    }

    function setStatus(msg, className) { statusEl.innerText = msg; statusEl.className = className; }

    function getLocalYMD(dateObj) {
        const year = dateObj.getFullYear();
        const month = String(dateObj.getMonth() + 1).padStart(2, '0');
        const day = String(dateObj.getDate()).padStart(2, '0');
        return `${year}-${month}-${day}`;
    }

    const dailyDateInput = document.getElementById('dailyDateSelector');
    if(!dailyDateInput.value) dailyDateInput.value = getLocalYMD(new Date());
    
    const monthSelector = document.getElementById('monthSelector');
    if(!monthSelector.value) {
        const today = new Date();
        monthSelector.value = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}`;
    }

    function updateUI() { window.renderDaily(); window.renderMonthly(); window.updateDdayDisplay(); }

    window.calcTotalMinutes = (planArray) => {
        let totalMin = 0;
        planArray.forEach(row => {
            let start = row.timeActualStart;
            let end = row.timeActualEnd;
            if(start && end) {
                let [sh, sm] = start.split(':').map(Number);
                let [eh, em] = end.split(':').map(Number);
                let sMin = sh*60 + sm;
                let eMin = eh*60 + em;
                if(eMin < sMin) eMin += 24*60; 
                totalMin += (eMin - sMin);
            }
        });
        return totalMin;
    };

    function getCurrentDailyData() {
        const dStr = dailyDateInput.value;
        if (!appData.dailyStore[dStr]) appData.dailyStore[dStr] = { plan: [], memo: "" };
        return appData.dailyStore[dStr];
    }

    window.changeDailyDay = (offset) => {
        let d = new Date(dailyDateInput.value);
        d.setDate(d.getDate() + offset);
        dailyDateInput.value = getLocalYMD(d);
        window.renderDaily();
    };
    
    window.goToToday = () => { dailyDateInput.value = getLocalYMD(new Date()); window.renderDaily(); };
    window.goToDate = (dateStr) => { dailyDateInput.value = dateStr; window.switchTab('daily'); window.renderDaily(); };

    window.renderDaily = () => {
        const currentData = getCurrentDailyData();
        const tbody = document.getElementById('plannerBody');
        tbody.innerHTML = '';
        let completedCount = 0;
        
        let dObj = new Date(dailyDateInput.value);
        document.getElementById('dailyDayOfWeek').innerText = `(${DAY_NAMES[dObj.getDay()]})`;

        currentData.plan.forEach((row, index) => {
            if(row.done) completedCount++;
            const tr = document.createElement('tr');
            if(row.done) tr.className = 'completed-row';
            
            // onkeydown 부분 제거
            tr.innerHTML = `
                <td><input type="text" value="${row.timePlan || ''}" onchange="updateDailyRow(${index}, 'timePlan', this.value, false)"></td>
                <td><input type="text" value="${row.contentPlan || ''}" onchange="updateDailyRow(${index}, 'contentPlan', this.value, false)"></td>
                <td>
                    <div class="time-input-group">
                        <input type="time" class="time-input" value="${row.timeActualStart || ''}" onchange="updateDailyRow(${index}, 'timeActualStart', this.value, true)">
                        <span style="color:#7f8c8d; font-weight:bold;">~</span>
                        <input type="time" class="time-input" value="${row.timeActualEnd || ''}" onchange="updateDailyRow(${index}, 'timeActualEnd', this.value, true)">
                    </div>
                </td>
                <td><input type="text" value="${row.contentActual || ''}" onchange="updateDailyRow(${index}, 'contentActual', this.value, false)"></td>
                <td><input type="checkbox" ${row.done ? 'checked' : ''} onchange="updateDailyRow(${index}, 'done', this.checked, true)"></td>
                <td><button class="delete-btn" onclick="deleteDailyRow(${index})">삭제</button></td>
            `;
            tbody.appendChild(tr);
        });

        const total = currentData.plan.length;
        const pct = total === 0 ? 0 : Math.round((completedCount / total) * 100);
        document.getElementById('progressBar').style.width = pct + '%';
        document.getElementById('progressBar').innerText = pct + '% 달성';
        
        document.getElementById('dailyMemoInput').value = currentData.memo || "";
        document.getElementById('goalDate').value = appData.goalDate || "";

        let totalMins = window.calcTotalMinutes(currentData.plan);
        let hours = Math.floor(totalMins / 60);
        let mins = totalMins % 60;
        document.getElementById('dailyTotalTime').innerText = `⏱️ 하루 공부시간: ${hours}시간 ${mins}분`;
    };

    window.updateDailyRow = (index, key, value, shouldRender) => { 
        const currentData = getCurrentDailyData();
        currentData.plan[index][key] = value; 
        
        if(shouldRender) {
            window.renderDaily(); 
        } else {
            let totalMins = window.calcTotalMinutes(currentData.plan);
            let hours = Math.floor(totalMins / 60);
            let mins = totalMins % 60;
            document.getElementById('dailyTotalTime').innerText = `⏱️ 하루 공부시간: ${hours}시간 ${mins}분`;
        }
        saveToServer(); 
    };

    window.addDailyRow = () => { getCurrentDailyData().plan.push({ timePlan: '', contentPlan: '', timeActualStart: '', timeActualEnd: '', contentActual: '', done: false }); window.renderDaily(); saveToServer(); };
    window.deleteDailyRow = (index) => { if(confirm("이 일정을 삭제할까요?")) { getCurrentDailyData().plan.splice(index, 1); window.renderDaily(); saveToServer(); } };
    window.updateDailyMemo = (val) => { getCurrentDailyData().memo = val; saveToServer(); };

    window.updateDday = () => { appData.goalDate = document.getElementById('goalDate').value; saveToServer(); window.updateDdayDisplay(); };
    window.updateDdayDisplay = () => {
        const ddayDisplay = document.getElementById('ddayDisplay');
        if (!appData.goalDate) { ddayDisplay.innerText = "D-Day 미설정"; return; }
        const today = new Date(); today.setHours(0,0,0,0);
        const target = new Date(appData.goalDate); target.setHours(0,0,0,0);
        const diff = Math.ceil((target - today) / (1000 * 60 * 60 * 24));
        if (diff === 0) ddayDisplay.innerText = "D-Day (오늘!)";
        else if (diff > 0) ddayDisplay.innerText = `D-${diff}`;
        else ddayDisplay.innerText = `D+${Math.abs(diff)}`;
    };

    window.changeMonthOffset = (offset) => {
        let [y, m] = monthSelector.value.split('-');
        let d = new Date(y, parseInt(m)-1 + offset, 1);
        monthSelector.value = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
        window.renderMonthly();
    };

    window.goToThisMonth = () => {
        let today = new Date();
        monthSelector.value = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}`;
        window.renderMonthly();
    };

    function getCurrentMonthData() {
        const m = monthSelector.value;
        if (!appData.monthlyDataStore[m]) appData.monthlyDataStore[m] = { goals: [], deadlines: [], memo: "" };
        return appData.monthlyDataStore[m];
    }
    
    window.changeMonth = () => { window.renderMonthly(); };
    
    function getDayLabel(dateStr) {
        if(!dateStr) return "";
        let d = new Date(dateStr);
        return `(${DAY_NAMES[d.getDay()]})`;
    }

    window.renderMonthly = () => {
        const data = getCurrentMonthData();
        const goalDiv = document.getElementById('goalContainer');
        goalDiv.innerHTML = '';
        
        data.goals.forEach((g, i) => {
            goalDiv.innerHTML += `
                <div class="list-item">
                    <input type="checkbox" ${g.done ? 'checked' : ''} onchange="updateM(${i},'goals','done',this.checked, true)">
                    <input type="date" class="input-box" style="width:130px;" value="${g.targetDate}" onchange="updateM(${i},'goals','targetDate',this.value, true)">
                    <span class="day-label">${getDayLabel(g.targetDate)}</span>
                    <input type="text" value="${g.text}" onchange="updateM(${i},'goals','text',this.value, false)" style="${g.done ? 'text-decoration:line-through; color:#ccc;' : ''}">
                    <button class="delete-btn" onclick="deleteM(${i},'goals')">삭제</button>
                </div>`;
        });
        
        const deadlineDiv = document.getElementById('deadlineContainer');
        deadlineDiv.innerHTML = '';
        
        data.deadlines.forEach((d, i) => {
            deadlineDiv.innerHTML += `
                <div class="list-item">
                    <input type="date" class="input-box" style="width:130px;" value="${d.date}" onchange="updateM(${i},'deadlines','date',this.value, true)">
                    <span class="day-label">${getDayLabel(d.date)}</span>
                    <input type="text" value="${d.text}" onchange="updateM(${i},'deadlines','text',this.value, false)">
                    <button class="delete-btn" onclick="deleteM(${i},'deadlines')">삭제</button>
                </div>`;
        });
        document.getElementById('monthlyMemoInput').value = data.memo || "";
        renderCalendar(data);
    };

    window.updateM = (index, type, key, val, shouldRender) => { 
        getCurrentMonthData()[type][index][key] = val; 
        if(shouldRender) window.renderMonthly(); 
        saveToServer(); 
    };

    window.addGoal = () => { getCurrentMonthData().goals.push({text:'', targetDate:'', done:false}); window.renderMonthly(); saveToServer(); };
    window.addDeadline = () => { getCurrentMonthData().deadlines.push({date:'', text:''}); window.renderMonthly(); saveToServer(); };
    window.deleteM = (index, type) => { if(confirm("이 항목을 정말 삭제하시겠습니까?")) { getCurrentMonthData()[type].splice(index, 1); window.renderMonthly(); saveToServer(); } };
    window.updateMonthlyMemo = (val) => { getCurrentMonthData().memo = val; saveToServer(); };

    function renderCalendar(data) {
        const grid = document.getElementById('calendarGrid');
        grid.innerHTML = '';
        const [year, month] = monthSelector.value.split('-');
        const firstDay = new Date(year, month - 1, 1).getDay();
        const daysInMonth = new Date(year, month, 0).getDate();
        let monthlyTotalMins = 0; 

        for(let i=0; i<firstDay; i++) grid.innerHTML += `<div class="calendar-cell empty"></div>`;
        
        for(let day=1; day<=daysInMonth; day++) {
            const dStr = `${year}-${month}-${String(day).padStart(2, '0')}`;
            const dayGoals = data.goals.filter(g => g.targetDate === dStr && g.text);
            const dayDeads = data.deadlines.filter(d => d.date === dStr && d.text);
            let badges = '';
            
            if (appData.dailyStore && appData.dailyStore[dStr]) {
                if (appData.dailyStore[dStr].plan) {
                    let dayTotalMins = window.calcTotalMinutes(appData.dailyStore[dStr].plan);
                    if (dayTotalMins > 0) {
                        monthlyTotalMins += dayTotalMins;
                        let h = Math.floor(dayTotalMins / 60);
                        let m = dayTotalMins % 60;
                        let timeText = h > 0 ? `${h}h ${m}m` : `${m}m`;
                        badges += `<div class="cal-badge badge-time">⏱️ ${timeText}</div>`;
                    }
                }
                let dMemo = appData.dailyStore[dStr].memo;
                if (dMemo && dMemo.trim() !== "") {
                    let shortMemo = dMemo.length > 5 ? dMemo.substring(0, 5) + ".." : dMemo;
                    badges += `<div class="cal-badge badge-memo">📝 ${shortMemo}</div>`;
                }
            }
            dayDeads.forEach(d => badges += `<div class="cal-badge badge-deadline">🚨 ${d.text}</div>`);
            dayGoals.forEach(g => badges += `<div class="cal-badge badge-goal" style="${g.done?'opacity:0.5; text-decoration:line-through;':''}">🎯 ${g.done?'✓ ':''}${g.text}</div>`);
            grid.innerHTML += `<div class="calendar-cell" onclick="goToDate('${dStr}')" title="클릭해서 작성하기"><span class="cal-day-num">${day}</span>${badges}</div>`;
        }
        let mHours = Math.floor(monthlyTotalMins / 60);
        let mMins = monthlyTotalMins % 60;
        document.getElementById('monthlyTotalTime').innerText = `🗓️ 월 누적 시간: ${mHours}시간 ${mMins}분`;
    }

    window.switchTab = (tabId) => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        if(tabId === 'daily') {
            document.getElementById('tabDaily').classList.add('active');
            document.getElementById('dailyView').classList.add('active');
        } else {
            document.getElementById('tabMonthly').classList.add('active');
            document.getElementById('monthlyView').classList.add('active');
            window.renderMonthly(); 
        }
    };
</script>

</body>
</html>
