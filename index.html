<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>프라이빗 스터디 플래너 Pro Max</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; margin: 0; padding: 20px; background-color: #f4f7f6; color: #333; }
        .container { max-width: 1200px; margin: 0 auto; background-color: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.08); position: relative; }
        .header-section { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        h1 { margin: 0; color: #2c3e50; font-size: 1.6em; cursor: pointer; transition: opacity 0.2s; }
        h1:hover { opacity: 0.7; }
        
        #syncStatus { position: fixed; top: 20px; right: 20px; font-size: 0.9em; font-weight: bold; padding: 10px 20px; border-radius: 8px; z-index: 10000; transition: opacity 0.3s ease; opacity: 0; pointer-events: none; background-color: #e74c3c; color: white; box-shadow: 0 4px 10px rgba(0,0,0,0.15); }
        
        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: rgba(44, 62, 80, 0.9); color: white; padding: 12px 24px; border-radius: 30px; font-weight: bold; z-index: 10000; opacity: 0; transition: opacity 0.3s ease; pointer-events: none; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        #loginOverlay, .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(244, 247, 246, 0.8); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        .login-box, .modal-box { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; min-width: 300px; }
        .login-btn { background: #4285F4; color: white; border: none; padding: 12px 24px; font-size: 1.1em; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 20px; transition: background 0.2s; }
        .dday-wrapper { display: flex; flex-wrap: wrap; gap: 8px; justify-content: flex-end; align-items: center; max-width: 600px; margin-right: 20px; }
        .dday-badge { background:#fdf2f2; color:#e74c3c; border: 1px solid #fadbd8; padding: 6px 12px; border-radius: 20px; font-weight: bold; font-size: 0.95em; }
        .dday-list-item { display: flex; justify-content: space-between; align-items: center; background: #f8f9fa; padding: 10px; border-radius: 6px; margin-bottom: 8px; border: 1px solid #eee; }
        .tabs { display: flex; border-bottom: 2px solid #ddd; margin-bottom: 20px; gap: 5px; }
        .tab { padding: 12px 25px; cursor: pointer; font-weight: bold; color: #95a5a6; border-bottom: 3px solid transparent; border-radius: 8px 8px 0 0; transition: all 0.2s; }
        .tab.active { color: #2c3e50; border-bottom: 3px solid #3498db; background-color: #f8f9fa; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s; }
        .input-box { padding: 6px; border: 1px solid #ddd; border-radius: 4px; font-size: 0.9em; font-family: inherit; }
        button { padding: 8px 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: background 0.2s; }
        .add-btn { background-color: #3498db; color: white; }
        .copy-btn { background-color: #2980b9; color: white; padding: 4px 10px; font-size: 0.85em; margin-right: 5px; }
        .delete-btn { background-color: #e74c3c; color: white; padding: 4px 10px; font-size: 0.85em; margin-right: 5px; }
        .nav-btn { background-color: #ecf0f1; color: #2c3e50; border: 1px solid #bdc3c7; }
        .progress-wrapper { background-color: #e0e0e0; border-radius: 8px; overflow: hidden; height: 26px; flex-grow: 1; margin-right: 15px;}
        .progress-bar { height: 100%; background-color: #27ae60; width: 0%; text-align: center; line-height: 26px; color: white; font-weight: bold; transition: width 0.4s ease; }
        
        .table-container { max-height: 55vh; overflow-y: auto; border: 1px solid #ddd; border-radius: 8px; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; }
        th { background-color: #ecf0f1; font-weight: bold; position: sticky; top: 0; z-index: 10; box-shadow: 0 2px 2px -1px rgba(0,0,0,0.1); padding: 10px; text-align: center;}
        td { border-bottom: 1px solid #ddd; border-right: 1px solid #ddd; padding: 6px; text-align: center; vertical-align: middle; background-color: #fff;}
        td input[type="text"], td select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-family: inherit; }
        .completed-row td { background-color: #f0fdf4; }
        .completed-row input[type="text"] { color: #94a3b8; text-decoration: line-through; }
        .memo-area { width: 100%; height: 120px; padding: 15px; border: 1px solid #ccc; border-radius: 6px; resize: vertical; box-sizing: border-box; font-family: inherit; margin-top: 20px; }
        .clear-btn { position: absolute; right: 5px; top: 50%; transform: translateY(-50%); background: none; border: none; font-size: 1.2em; color: #bdc3c7; cursor: pointer; padding: 0 5px; }
        
        .drag-handle { cursor: default; font-size: 1.2em; color: #95a5a6; transition: all 0.2s ease; border-radius: 4px; user-select: none; }
        .drag-handle:hover { background-color: #e8f4fd; color: #2c3e50; transform: scale(1.1); outline: 1px solid #3498db; }

        input[type="checkbox"] { width: 22px; height: 22px; cursor: pointer; accent-color: #27ae60; vertical-align: middle; margin: 0; }
        label { cursor: pointer; }

        .date-selector-area { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: #f8f9fa; padding: 15px; border-radius: 8px; border: 1px solid #eee; }
        .time-badge { font-size: 1.1em; font-weight: bold; color: #d35400; background: #fdebd0; padding: 8px 15px; border-radius: 8px; border: 1px solid #fad7a1;}
        
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); background: #eee; gap: 1px; border: 1px solid #eee; border-top: none;}
        .calendar-header { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-weight: bold; background: #ecf0f1; padding: 10px 0; border: 1px solid #eee; border-radius: 8px 8px 0 0; position: sticky; top: 0; z-index: 20; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .calendar-cell { background: #fff; min-height: 110px; padding: 8px; display: flex; flex-direction: column; gap: 4px; cursor: pointer; transition: background 0.2s; position: relative;}
        .calendar-cell:hover { background: #f1f8ff; }
        .calendar-cell.drag-over { background: #e8f4fd; border: 2px dashed #3498db; }
        .cal-day-num { font-weight: bold; color: #333; margin-bottom: 2px; }
        .cal-badge { font-size: 0.75em; padding: 4px 6px; border-radius: 4px; color: #fff; font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; box-shadow: 0 1px 2px rgba(0,0,0,0.1);}
        
        /* 🔥 회고 뱃지 호버 효과 🔥 */
        .badge-memo { background-color: #9b59b6; transition: all 0.2s; }
        .badge-memo:hover { 
            white-space: normal; 
            position: absolute; 
            z-index: 100; 
            background: #8e44ad; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.2); 
            padding: 8px; 
            width: calc(100% - 16px);
            left: 8px;
            top: 30px;
        }

        .cal-badge.draggable { cursor: default; position: relative; transition: all 0.15s ease; }
        .cal-badge.draggable:hover { outline: 2px solid #2c3e50; outline-offset: -1px; filter: brightness(0.9); transform: scale(1.02); z-index: 10; }

        .badge-time { background-color: #3498db; }
        .badge-goal { background-color: #f39c12; }
        .badge-deadline { background-color: #e74c3c; }

        .affirmation-box { width: 100%; padding: 15px; border-radius: 8px; font-size: 1.1em; font-weight: bold; text-align: center; color: #6c5ce7; background-color: #f6f5ff; margin-bottom: 20px; box-sizing: border-box; border: 1px solid #e0dfff; box-shadow: 0 2px 5px rgba(108, 92, 231, 0.05); }
        .goal-progress-wrapper { background-color: #ecf0f1; border-radius: 20px; overflow: hidden; height: 22px; margin-bottom: 15px; border: 1px solid #bdc3c7;}
        .goal-progress-bar { height: 100%; background-color: #f39c12; width: 0%; text-align: center; line-height: 22px; color: white; font-size: 0.85em; font-weight: bold; transition: width 0.5s ease; }
        
        .monthly-grid { display: flex; gap: 20px; margin-top: 20px; }
        .monthly-card { flex: 1; background: #fff; padding: 20px; border-radius: 8px; border: 1px solid #ddd; }
        .list-item { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; background: #f8f9fa; padding: 8px 12px; border-radius: 6px; border: 1px solid #eee; }

        .chart-container { display: flex; align-items: flex-end; justify-content: space-around; height: 250px; background: #f8f9fa; padding: 20px; border-radius: 8px; border: 1px solid #ddd; margin-top: 20px;}
        .bar { width: 100%; background-color: #3498db; border-radius: 4px 4px 0 0; display:flex; justify-content:center; align-items:flex-start; padding-top:5px; color:white; font-size:0.8em; font-weight:bold;}
        .stat-num { font-size: 2em; font-weight: bold; color: #27ae60; }
        
        @media (max-width: 768px) { .table-container { max-height: unset; overflow-x: auto; } table { min-width: 900px; } .date-selector-area { flex-direction: column; } .dday-wrapper { justify-content: flex-start; } .monthly-grid { flex-direction: column; } }
    </style>
</head>
<body>

<div id="syncStatus"></div>
<div id="toast">알림 메시지</div>

<div id="loginOverlay">
    <div class="login-box">
        <h2 style="margin-top:0; color:#2c3e50;">🔒 스터디 플래너 Pro Max</h2>
        <button class="login-btn" onclick="loginWithGoogle()">Google 계정으로 로그인</button>
    </div>
</div>

<div id="ddayModal" class="modal-overlay" style="display: none;">
    <div class="modal-box">
        <h2 style="margin-top:0;">🚩 다중 D-Day 관리</h2>
        <div style="display: flex; gap: 5px; margin-bottom: 20px; justify-content: center;">
            <input type="text" id="newDdayTitle" class="input-box" placeholder="이름" style="width: 120px;">
            <input type="text" id="newDdayDate" class="input-box" placeholder="YYYY-MM-DD" maxlength="10" oninput="formatDateInput(this)" style="width: 120px; text-align: center;">
            <button class="add-btn" onclick="addDday()">추가</button>
        </div>
        <div id="ddayListUI" style="max-height: 200px; overflow-y: auto; margin-bottom: 20px; text-align: left;"></div>
        <button class="nav-btn" onclick="closeDdayModal()" style="width: 100%;">닫기</button>
    </div>
</div>

<div class="container" id="appContainer" style="display: none;">
    <div class="header-section">
        <div><h1 onclick="switchTab('monthly')">📝 플래너 Pro Max</h1></div>
        <div style="display: flex; flex-direction: column; align-items: flex-end;">
            <div id="ddayContainer" class="dday-wrapper"></div>
            <div style="margin-top: 8px;">
                <button class="nav-btn" onclick="openDdayModal()" style="padding: 4px 8px; font-size: 0.8em;">🚩 D-Day 관리</button>
                <button onclick="logout()" style="background:#e74c3c; color:white; padding:4px 8px; font-size:0.8em; border:none; border-radius:4px; margin-left:5px; cursor:pointer;">로그아웃</button>
            </div>
        </div>
    </div>

    <div class="tabs">
        <div id="tabMonthly" class="tab active" onclick="switchTab('monthly')">🎯 월별 플래너</div>
        <div id="tabDaily" class="tab" onclick="switchTab('daily')">📅 일별 플래너</div>
        <div id="tabStats" class="tab" onclick="switchTab('stats')">📊 통계 분석</div>
    </div>

    <div id="monthlyView" class="tab-content active">
        <div class="date-selector-area">
            <div>
                <button class="nav-btn" onclick="changeMonthOffset(-1)">◀</button>
                <input type="month" id="monthSelector" class="input-box" onchange="changeMonth()">
                <button class="nav-btn" onclick="changeMonthOffset(1)">▶</button>
                <button class="nav-btn" style="margin-left:10px;" onclick="goToThisMonth()">이번 달</button>
            </div>
            <div id="monthlyTotalTime" class="time-badge">🗓️ 월 누적 시간: 0시간 0분</div>
        </div>
        <div class="calendar-container">
            <div class="calendar-header"><div>일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div>토</div></div>
            <div class="calendar-grid" id="calendarGrid"></div>
        </div>
        
        <div class="monthly-grid">
            <div class="monthly-card">
                <h3>🎯 핵심 목표</h3>
                <div class="goal-progress-wrapper"><div class="goal-progress-bar" id="monthlyGoalProgress">0% 달성</div></div>
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                    <div>
                        <label><input type="checkbox" onchange="toggleSelectAllMonthly('allGoals', this.checked)"> 전체선택</label>
                        <button class="delete-btn" style="margin-left:5px;" onclick="bulkDeleteMonthly('allGoals')">🗑️ 선택 삭제</button>
                    </div>
                    <button class="add-btn add-btn-small" onclick="addGoal()">+ 새 목표</button>
                </div>
                <div id="goalContainer"></div>
            </div>
            
            <div class="monthly-card">
                <h3>🚨 주요 일정</h3>
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                    <div>
                        <label><input type="checkbox" onchange="toggleSelectAllMonthly('allDeadlines', this.checked)"> 전체선택</label>
                        <button class="delete-btn" style="margin-left:5px;" onclick="bulkDeleteMonthly('allDeadlines')">🗑️ 선택 삭제</button>
                    </div>
                    <button class="add-btn add-btn-small" onclick="addDeadline()">+ 새 일정</button>
                </div>
                <div id="deadlineContainer"></div>
            </div>
        </div>
    </div>

    <div id="dailyView" class="tab-content">
        <div id="dailyAffirmation" class="affirmation-box">✨ 명언 로딩중...</div>

        <div class="date-selector-area">
            <div style="display: flex; align-items: center; gap: 10px;">
                <button class="nav-btn" onclick="changeDailyDay(-1)">◀ 어제</button>
                <input type="date" id="dailyDateSelector" max="9999-12-31" class="input-box" style="font-size: 1.2em; font-weight: bold;" onchange="renderDaily()">
                <span id="dailyDayOfWeek" style="font-size: 1.2em; font-weight: bold; color: #34495e;">(요일)</span>
                <button class="nav-btn" onclick="changeDailyDay(1)">내일 ▶</button>
                <button class="nav-btn" style="margin-left:10px;" onclick="goToToday()">오늘</button>
            </div>
            <div style="display: flex; gap: 5px; align-items: center;">
                <select id="templateSelect" class="input-box" style="width: 120px;"><option value="">템플릿 선택...</option></select>
                <button class="nav-btn" onclick="loadTemplate()">불러오기</button>
                <button class="nav-btn" style="color: #e74c3c; border-color: #e74c3c;" onclick="deleteTemplate()">삭제</button>
                <button class="add-btn add-btn-small" onclick="saveTemplate()">현재 일정 저장</button>
            </div>
            <div id="dailyTotalTime" class="time-badge">⏱️ 하루 공부시간: 0시간 0분</div>
        </div>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <div class="progress-wrapper"><div class="progress-bar" id="progressBar">0%</div></div>
            <div style="display: flex;">
                <button class="delete-btn" onclick="bulkDeleteRows()">🗑️ 선택 삭제</button>
                <button class="copy-btn" onclick="bulkCopyRows()">📋 선택 복사</button>
                <button class="add-btn add-btn-small" onclick="addDailyRow()">+ 새 일정 추가</button>
            </div>
        </div>
        <div class="table-container">
            <table>
                <thead><tr>
                    <th style="width: 4%;"><input type="checkbox" id="selectAllCheckbox" onchange="toggleSelectAll(this.checked)"></th>
                    <th style="width: 4%;">순서</th><th style="width: 14%;">계획 시간</th><th style="width: 10%;">분류</th>
                    <th style="width: 24%;">계획 내용</th><th style="width: 15%;">실제 시간</th><th style="width: 24%;">실제 내용</th><th style="width: 5%;">완료</th>
                </tr></thead>
                <tbody id="plannerBody"></tbody>
            </table>
        </div>
        <textarea id="dailyMemoInput" class="memo-area" placeholder="오늘의 회고 (여기에 적은 내용은 월별 캘린더에 연동됩니다!)" oninput="updateDailyMemo(this.value)"></textarea>
    </div>

    <div id="statsView" class="tab-content">
        <div style="display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 10px;">
            <h2 style="margin:0;">📊 통계 분석</h2>
            <div style="display: flex; align-items: center; gap: 5px; background: #fff; padding: 10px 15px; border-radius: 8px; border: 1px solid #ddd; box-shadow: 0 2px 5px rgba(0,0,0,0.03);">
                <span style="font-weight: bold; font-size: 0.9em; color: #2c3e50;">📥 다운로드 기간:</span>
                <input type="text" id="exportStartDate" class="input-box" placeholder="YYYY-MM-DD" maxlength="10" oninput="formatDateInput(this)" style="width: 100px; text-align: center;">
                <span style="color: #7f8c8d; font-weight: bold;">~</span>
                <input type="text" id="exportEndDate" class="input-box" placeholder="YYYY-MM-DD" maxlength="10" oninput="formatDateInput(this)" style="width: 100px; text-align: center;">
                <button class="add-btn add-btn-small" onclick="exportDataToCSV()" style="margin-left: 5px;">💾 엑셀 추출</button>
            </div>
        </div>
        
        <div class="chart-container" id="statChart"></div>
        <div class="stat-summary"><div class="stat-box"><div>이번 달 총 공부시간</div><div class="stat-num" id="statMonthTotal">0h 0m</div></div>
        <div class="stat-box"><div>최근 7일 평균</div><div class="stat-num" id="stat7DayAvg" style="color:#3498db;">0h 0m</div></div></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC4J47Xe8eqv9Gf2MNReewVia77G3dyMsc",
        authDomain: "kgb-planner.firebaseapp.com",
        projectId: "kgb-planner",
        storageBucket: "kgb-planner.firebasestorage.app",
        messagingSenderId: "215060228950",
        appId: "1:215060228950:web:1534f87f7f9ed70cb484f7",
        measurementId: "G-1VM8T24LHW"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();
    const docRef = doc(db, "plannerDB", "myData");

    let appData = { dailyStore: {}, dDays: [], monthlyDataStore: {}, allGoals: [], allDeadlines: [], templates: {} };
    let saveTimeout, unsubscribeSnapshot = null;

    function setStatus(msg, className) {
        const el = document.getElementById('syncStatus');
        if (el) { 
            if (className.includes('error') || msg.includes('오류') || msg.includes('실패')) {
                el.innerText = "⚠️ 데이터 연결 오류 또는 저장 실패";
                el.style.opacity = '1';
            } else { el.style.opacity = '0'; }
        }
    }

    window.showToast = (msg) => { const toast = document.getElementById('toast'); toast.innerText = msg; toast.style.opacity = '1'; setTimeout(() => { toast.style.opacity = '0'; }, 2000); };
    
    window.formatDateInput = (el) => {
        let val = el.value.replace(/[^0-9]/g, '');
        if (val.length > 4) val = val.slice(0, 4) + '-' + val.slice(4);
        if (val.length > 7) val = val.slice(0, 7) + '-' + val.slice(7, 9);
        el.value = val;
    };

    window.addEventListener('keydown', (e) => {
        // 🔥 탭 이동 단축키 🔥
        if (e.altKey && e.key === '1') { e.preventDefault(); switchTab('monthly'); }
        if (e.altKey && e.key === '2') { e.preventDefault(); switchTab('daily'); }
        if (e.altKey && e.key === '3') { e.preventDefault(); switchTab('stats'); }

        if (e.altKey && e.key.toLowerCase() === 'a') { e.preventDefault(); addDailyRow(); }
        if (e.altKey && e.key.toLowerCase() === 'c') { e.preventDefault(); bulkCopyRows(); }
        if (e.altKey && e.key.toLowerCase() === 'd') { 
            e.preventDefault(); 
            if(document.getElementById('tabDaily').classList.contains('active')) bulkDeleteRows(); 
        }
    });

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('appContainer').style.display = 'block';
            startSync();
        } else {
            document.getElementById('loginOverlay').style.display = 'flex';
            document.getElementById('appContainer').style.display = 'none';
        }
    });

    function startSync() {
        unsubscribeSnapshot = onSnapshot(docRef, (docSnap) => {
            if (docSnap.exists()) {
                appData = { ...appData, ...docSnap.data() };
                if(!window.isTyping) updateUI();
            } else { setDoc(docRef, appData, { merge: true }); }
        });
    }

    function saveToServer() {
        clearTimeout(saveTimeout);
        saveTimeout = setTimeout(async () => {
            try { await setDoc(docRef, appData, { merge: true }); } 
            catch(e) { setStatus("❌ 실패", "sync-error"); }
        }, 1000); 
    }

    function getLocalYMD(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
    
    function updateUI() { 
        if(!document.getElementById('monthSelector').value) document.getElementById('monthSelector').value = getLocalYMD(new Date()).slice(0,7);
        // 🔥 새로고침 시 월별플래너가 나오도록 설정 🔥
        window.switchTab('monthly'); 
        window.renderDdays(); 
        window.updateTemplateDropdown(); 
    }

    window.calcTotalMinutes = (arr) => {
        let total = 0; const regex = /(\d{1,2}):(\d{2})\s*[~-]\s*(\d{1,2}):(\d{2})/;
        arr.forEach(r => { if(r.timeActual){ let m = r.timeActual.match(regex); if(m){ let s=parseInt(m[1])*60+parseInt(m[2]), e=parseInt(m[3])*60+parseInt(m[4]); if(e<s)e+=1440; total+=(e-s); } } });
        return total;
    };

    function getCurrentDailyData() {
        const sel = document.getElementById('dailyDateSelector');
        if(!sel.value) sel.value = getLocalYMD(new Date());
        if (!appData.dailyStore[sel.value]) appData.dailyStore[sel.value] = { plan: [], memo: "" };
        return appData.dailyStore[sel.value];
    }

    window.changeDailyDay = (o) => { let d=new Date(document.getElementById('dailyDateSelector').value); d.setDate(d.getDate()+o); document.getElementById('dailyDateSelector').value=getLocalYMD(d); window.renderDaily(); };
    window.goToToday = () => { document.getElementById('dailyDateSelector').value=getLocalYMD(new Date()); window.renderDaily(); };
    window.goToDate = (s) => { document.getElementById('dailyDateSelector').value=s; window.switchTab('daily'); window.renderDaily(); };
    window.toggleSelectAll = (c) => { document.querySelectorAll('.bulk-move-checkbox').forEach(cb => cb.checked = c); };

        if(!isNaN(dateNum)) document.getElementById('dailyAffirmation').innerHTML = `✨ <b>오늘의 한마디:</b> ${quotes[dateNum % quotes.length]}`;

            tr.ondragstart=(e)=>{draggedRowIndex=i; e.target.classList.add('dragging');};
            tr.ondragend=(e)=>{ e.target.classList.remove('dragging'); e.target.setAttribute('draggable', false); };
            tr.ondragover=(e)=>e.preventDefault();
            tr.ondrop=(e)=>{ e.preventDefault(); if(draggedRowIndex!==null && draggedRowIndex!==i){ const item = cur.plan.splice(draggedRowIndex,1)[0]; cur.plan.splice(i,0,item); window.renderDaily(); saveToServer(); } draggedRowIndex=null; };
            
            tr.innerHTML = `
                <td><input type="checkbox" class="bulk-move-checkbox" data-index="${i}"></td>
                <td class="drag-handle" onmousedown="this.parentElement.setAttribute('draggable', true)" onmouseup="this.parentElement.setAttribute('draggable', false)">☰</td>
                <td><div style="position:relative;display:flex;align-items:center;"><input type="text" id="input_timePlan_${i}" style="text-align:center; padding-right:20px;" value="${row.timePlan||''}" onfocus="window.isTyping=true" oninput="updateDailyData(${i},'timePlan',this.value)" onblur="handleTimeBlur(${i},'timePlan',this)"><button onclick="clearDailyContent(${i},'timePlan')" class="clear-btn" tabindex="-1">✕</button></div></td>
                <td><select onchange="updateDailyData(${i},'studyType',this.value)"><option value="" ${!row.studyType?'selected':''}>선택</option><option value="강의" ${row.studyType==='강의'?'selected':''}>강의</option><option value="기본서" ${row.studyType==='기본서'?'selected':''}>기본서</option></select></td>
                <td><div style="position:relative;display:flex;align-items:center;"><input type="text" id="input_contentPlan_${i}" value="${row.contentPlan||''}" onfocus="window.isTyping=true" oninput="updateDailyData(${i},'contentPlan',this.value)" onblur="window.isTyping=false"><button onclick="clearDailyContent(${i},'contentPlan')" class="clear-btn" tabindex="-1">✕</button></div></td>
                <td><div style="position:relative;display:flex;align-items:center;"><input type="text" id="input_timeActual_${i}" style="text-align:center; padding-right:20px;" value="${row.timeActual||''}" onfocus="window.isTyping=true" oninput="updateDailyData(${i},'timeActual',this.value)" onblur="handleTimeBlur(${i},'timeActual',this)"><button onclick="clearDailyContent(${i},'timeActual')" class="clear-btn" tabindex="-1">✕</button></div></td>
                <td><div style="position:relative;display:flex;align-items:center;"><input type="text" id="input_contentActual_${i}" value="${row.contentActual||''}" onfocus="window.isTyping=true" oninput="updateDailyData(${i},'contentActual',this.value)" onblur="window.isTyping=false"><button onclick="clearDailyContent(${i},'contentActual')" class="clear-btn" tabindex="-1">✕</button></div></td>
                <td><input type="checkbox" ${row.done?'checked':''} onchange="updateDailyCheck(${i},this.checked,this)"></td>
            `;
            tbody.appendChild(tr);
        });
        updateDailyProgressBar(); document.getElementById('dailyMemoInput').value = cur.memo || ""; updateDailyTotalTimeBadge();
    };

    window.bulkDeleteRows = () => {
        let indices = []; document.querySelectorAll('.bulk-move-checkbox').forEach(cb => { if(cb.checked) indices.push(parseInt(cb.dataset.index)); });
        if(!indices.length) return showToast("선택된 일정이 없습니다.");
        if(confirm(`${indices.length}개를 삭제하시겠습니까?`)){ indices.sort((a,b)=>b-a).forEach(idx=>getCurrentDailyData().plan.splice(idx,1)); window.renderDaily(); saveToServer(); }
    };

    window.bulkCopyRows = () => {
        let indices = []; document.querySelectorAll('.bulk-move-checkbox').forEach(cb => { if(cb.checked) indices.push(parseInt(cb.dataset.index)); });
        if(!indices.length) return showToast("선택된 일정이 없습니다.");
        let target = prompt("복사할 날짜 (YYYY-MM-DD)");
        if(target && target.match(/^\d{4}-\d{2}-\d{2}$/)){
            if(!appData.dailyStore[target]) appData.dailyStore[target] = { plan:[], memo: "" };
            indices.forEach(idx => { let item = JSON.parse(JSON.stringify(getCurrentDailyData().plan[idx])); item.done=false; item.timeActual=""; item.contentActual=""; appData.dailyStore[target].plan.push(item); });
            saveToServer(); showToast("복사 완료!");
        }
    };

    window.clearDailyContent = (index, key) => { getCurrentDailyData().plan[index][key] = ''; window.renderDaily(); saveToServer(); };
    window.saveTemplate = () => { let p = getCurrentDailyData().plan; if(!p.length) return; let n = prompt("템플릿 이름"); if(n){ appData.templates[n] = p.map(r=>({timePlan:r.timePlan, studyType:r.studyType||'', contentPlan:r.contentPlan, timeActual:'', contentActual:'', done:false})); updateTemplateDropdown(); saveToServer(); } };
    window.loadTemplate = () => { let v = document.getElementById('templateSelect').value; if(!v) return; getCurrentDailyData().plan.push(...JSON.parse(JSON.stringify(appData.templates[v]))); window.renderDaily(); saveToServer(); };
    window.deleteTemplate = () => {
        let v = document.getElementById('templateSelect').value;
        if(!v) return showToast("삭제할 템플릿을 선택하세요.");
        if(confirm(`'${v}' 템플릿을 삭제하시겠습니까?`)){ delete appData.templates[v]; updateTemplateDropdown(); saveToServer(); }
    };
    window.updateTemplateDropdown = () => { let s = document.getElementById('templateSelect'); s.innerHTML = '<option value="">템플릿 선택...</option>'; for(let k in appData.templates) s.innerHTML += `<option value="${k}">${k}</option>`; };
    window.updateDailyProgressBar = () => { let p = getCurrentDailyData().plan, t=p.length, c=p.filter(r=>r.done).length, pct=t?Math.round(c/t*100):0; document.getElementById('progressBar').style.width=pct+'%'; document.getElementById('progressBar').innerText=pct+'%'; };
    window.updateDailyTotalTimeBadge = () => { let m=window.calcTotalMinutes(getCurrentDailyData().plan); document.getElementById('dailyTotalTime').innerText=`⏱️ 하루 공부시간: ${Math.floor(m/60)}시간 ${m%60}분`; };
    window.updateDailyData = (i, k, v) => { getCurrentDailyData().plan[i][k] = v; saveToServer(); };
    window.updateDailyCheck = (i, c, el) => { getCurrentDailyData().plan[i].done = c; updateDailyProgressBar(); saveToServer(); };
    window.handleTimeBlur = (i, k, el) => { window.isTyping=false; let v=el.value, c=v.replace(/[^0-9]/g,''); if(c.length===8){ let f=`${c.slice(0,2)}:${c.slice(2,4)}~${c.slice(4,6)}:${c.slice(6,8)}`; getCurrentDailyData().plan[i][k]=f; el.value=f; } saveToServer(); };
    window.addDailyRow = () => { getCurrentDailyData().plan.push({ timePlan:'', studyType:'', contentPlan:'', timeActual:'', contentActual:'', done:false }); window.renderDaily(); saveToServer(); };
    window.updateDailyMemo = (v) => { getCurrentDailyData().memo = v; saveToServer(); };

    window.renderDdays = () => {
        const container = document.getElementById('ddayContainer'); container.innerHTML = '';
        if(!appData.dDays) return;
        appData.dDays.sort((a,b)=>new Date(a.date)-new Date(b.date)).forEach(d => {
            const diff = Math.ceil((new Date(d.date).setHours(0,0,0,0) - new Date().setHours(0,0,0,0)) / 86400000);
            const text = diff === 0 ? "D-Day" : diff > 0 ? `D-${diff}` : `D+${Math.abs(diff)}`;
            container.innerHTML += `<div class="dday-badge">${d.title} ${text}</div>`;
        });
    };

    window.openDdayModal = () => { document.getElementById('ddayModal').style.display='flex'; renderDdayListUI(); };
    window.closeDdayModal = () => { document.getElementById('ddayModal').style.display='none'; };
    window.renderDdayListUI = () => {
        const ui = document.getElementById('ddayListUI'); ui.innerHTML = '';
        appData.dDays.forEach((d, i) => { ui.innerHTML += `<div class="dday-list-item"><span>${d.title} (${d.date})</span><button class="delete-btn" onclick="deleteDday(${i})">삭제</button></div>`; });
    };
    window.addDday = () => {
        const t = document.getElementById('newDdayTitle').value, d = document.getElementById('newDdayDate').value;
        if(!t || !d) return; appData.dDays.push({title:t, date:d}); renderDdayListUI(); window.renderDdays(); saveToServer();
    };
    window.deleteDday = (i) => { appData.dDays.splice(i,1); renderDdayListUI(); window.renderDdays(); saveToServer(); };

    window.changeMonthOffset=(o)=>{let[y,m]=document.getElementById('monthSelector').value.split('-'); let d=new Date(y,m-1+o,1); document.getElementById('monthSelector').value=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`; window.renderMonthly();};
    window.goToThisMonth=()=>{document.getElementById('monthSelector').value=getLocalYMD(new Date()).slice(0,7); window.renderMonthly();};
    window.changeMonth=()=>window.renderMonthly();
    
    window.renderMonthly=()=>{
        const m = document.getElementById('monthSelector').value, gv = appData.allGoals.filter(g=>!g.targetDate||g.targetDate.startsWith(m)), dv = appData.allDeadlines.filter(d=>!d.date||d.date.startsWith(m));
        const totalGoals = gv.length, completedGoals = gv.filter(g => g.done).length, goalPct = totalGoals ? Math.round((completedGoals / totalGoals) * 100) : 0;
        const pBar = document.getElementById('monthlyGoalProgress');
        if (pBar) { pBar.style.width = goalPct + '%'; pBar.innerText = goalPct + '% 달성'; }

        const gc = document.getElementById('goalContainer'); gc.innerHTML = ''; 
        gv.forEach(g=>{ 
            const ri=appData.allGoals.indexOf(g); 
            gc.innerHTML+=`<div class="list-item"><input type="checkbox" class="goal-checkbox" data-index="${ri}"><input type="text" value="${g.targetDate}" class="input-box" style="width:90px; text-align:center;"><input type="text" value="${g.text}" oninput="updateMText(${ri},'allGoals',this.value)" class="input-box" style="flex-grow:1;"><label style="font-size:0.85em; font-weight:bold; color:#27ae60;"><input type="checkbox" ${g.done?'checked':''} onchange="updateMCheck(${ri},'allGoals',this.checked)"> 완료</label></div>`;
        });
        
        const dc = document.getElementById('deadlineContainer'); dc.innerHTML = ''; 
        dv.forEach(d=>{ 
            const ri=appData.allDeadlines.indexOf(d); 
            dc.innerHTML+=`<div class="list-item"><input type="checkbox" class="deadline-checkbox" data-index="${ri}"><input type="text" value="${d.date}" class="input-box" style="width:90px; text-align:center;"><input type="text" value="${d.text}" oninput="updateMText(${ri},'allDeadlines',this.value)" class="input-box" style="flex-grow:1;"></div>`;
        });
        renderCalendar();
    };

    window.updateMText=(i,t,v)=>{appData[t][i].text=v; saveToServer();};
    window.updateMCheck=(i,t,c)=>{appData[t][i].done=c; window.renderMonthly(); saveToServer();};
    window.addGoal=()=>{appData.allGoals.push({text:'',targetDate:document.getElementById('monthSelector').value+'-01',done:false}); window.renderMonthly(); saveToServer();};
    window.addDeadline=()=>{appData.allDeadlines.push({date:document.getElementById('monthSelector').value+'-01',text:''}); window.renderMonthly(); saveToServer();};

    function renderCalendar() {
        const grid = document.getElementById('calendarGrid'); grid.innerHTML = '';
        const [year, month] = document.getElementById('monthSelector').value.split('-');
        const first = new Date(year, month-1, 1).getDay(), days = new Date(year, month, 0).getDate();
        let totalMins = 0;
        
        for(let i=0; i<first; i++) grid.innerHTML += `<div class="calendar-cell" style="background:#fcfcfc; cursor:default;"></div>`;
        
        for(let d=1; d<=days; d++){
            const ds = `${year}-${month}-${String(d).padStart(2,'0')}`; 
            let b = '';

            if(appData.dailyStore[ds]){
                const dayPlan = appData.dailyStore[ds].plan;
                if(dayPlan && dayPlan.length){
                    let dayMins = window.calcTotalMinutes(dayPlan); 
                    totalMins += dayMins;
                    if(dayMins > 0) b += `<div class="cal-badge badge-time">⏱️ ${Math.floor(dayMins/60)}h ${dayMins%60}m</div>`;
                }
                // 🔥 캘린더 이미지(셀)에 오늘의 회고 내용 연동 🔥
                if(appData.dailyStore[ds].memo && appData.dailyStore[ds].memo.trim() !== ""){
                    const memoPreview = appData.dailyStore[ds].memo.replace(/\n/g, ' ');
                    b += `<div class="cal-badge badge-memo" title="${appData.dailyStore[ds].memo}">📝 ${memoPreview}</div>`;
                }
            }

            appData.allDeadlines.forEach((x, idx) => { if(x.date === ds) b += `<div class="cal-badge badge-deadline draggable" draggable="true" ondragstart="startMonthlyDrag(event, 'allDeadlines', ${idx})">🚨 ${x.text||'일정'}</div>`; });
            appData.allGoals.forEach((x, idx) => { if(x.targetDate === ds) b += `<div class="cal-badge badge-goal draggable" draggable="true" ondragstart="startMonthlyDrag(event, 'allGoals', ${idx})" style="${x.done?'opacity:0.5;text-decoration:line-through':''}">🎯 ${x.text||'목표'}</div>`; });
            
            grid.innerHTML += `<div class="calendar-cell" onclick="goToDate('${ds}')" ondragover="e=>e.preventDefault()" ondrop="dropMonthlyItem(event, '${ds}')"><span class="cal-day-num">${d}</span>${b}</div>`;
        }
        document.getElementById('monthlyTotalTime').innerText = `🗓️ 월 누적 시간: ${Math.floor(totalMins/60)}시간 ${totalMins%60}분`;
    }

    window.switchTab = (t) => {
        document.querySelectorAll('.tab, .tab-content').forEach(el => el.classList.remove('active'));
        document.getElementById('tab'+t.charAt(0).toUpperCase()+t.slice(1)).classList.add('active');
        document.getElementById(t+'View').classList.add('active');
        if(t==='daily') window.renderDaily(); else if(t==='monthly') window.renderMonthly(); else window.renderStats();
    };

    window.logout = () => signOut(auth).then(() => location.reload());
    window.loginWithGoogle = () => signInWithPopup(auth, provider);
</script>
</body>
</html>
